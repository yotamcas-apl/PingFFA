name: Auto Version & Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Bump Version and Push Tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch # Changes 1.0.0 -> 1.0.1

      - name: Update Version in build.gradle.kts
        run: |
          # This replaces the version string in your gradle file with the new tag
          sed -i "s/version = \".*\"/version = \"${{ steps.tag_version.outputs.new_version }}\"/" build.gradle.kts
          sed -i "s/version: .*/version: ${{ steps.tag_version.outputs.new_version }}/" src/main/resources/plugin.yml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add build.gradle.kts
          git commit -m "chore: bump version to ${{ steps.tag_version.outputs.new_version }} [skip ci]"
          git push

      - name: Build ShadowJar
        run: ./gradlew shadowJar

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_version.outputs.new_tag }}
          # This pulls the JAR from your 'output/libs' folder we defined earlier
          files: output/libs/*.jar
          # This uses your latest commit message as the description
          body: |
            ## Changes in this version:
            ${{ github.event.head_commit.message }}
          generate_release_notes: true